  { n:'hole',                  c:'SCENE',x:96, y:144,w:16,h:16,u:false,g:'',                           s:'0x72' },
  { n:'floor_spikes_anim_f0',  c:'SCENE',x:16, y:192,w:16,h:16,u:false,g:'',                          s:'0x72' },
  { n:'button_red_up',         c:'SCENE',x:16, y:208,w:16,h:16,u:false,g:'',                           s:'0x72' },
  { n:'button_blue_up',        c:'SCENE',x:48, y:208,w:16,h:16,u:false,g:'',                           s:'0x72' },
  { n:'lever_left',            c:'SCENE',x:80, y:208,w:16,h:16,u:false,g:'',                          s:'0x72' },
  { n:'lever_right',           c:'SCENE',x:96, y:208,w:16,h:16,u:false,g:'',                          s:'0x72' },

  // ── 0x72 UI (3) ────────────────────────────────────────────
  { n:'ui_heart_full',         c:'UI',x:289,y:370,w:13,h:12,u:false,g:'代码绘制血条',                 s:'0x72' },
  { n:'ui_heart_empty',        c:'UI',x:321,y:370,w:13,h:12,u:false,g:'',                             s:'0x72' },
  { n:'ui_heart_half',         c:'UI',x:305,y:370,w:13,h:12,u:false,g:'',                             s:'0x72' },

  // dungeon exit stairs — 0x72 atlas (Kenney fallback via useGameRenderer.ts)
  { n:'floor_stairs',  c:'SCENE',x:80,y:192,w:16,h:16,u:true, g:'楼梯出口(0x72)',             s:'0x72', ref:'useGameRenderer.ts' },
];

// ══════════════════════════════════════════════════════════════════
// Generated spritesheet 预加载
// ══════════════════════════════════════════════════════════════════
const SHEETS = {
  gen_slime_idle: { el: new Image(), src: '../src/assets/generated/slime_sheet.png' },
  gen_bat_idle:   { el: new Image(), src: '../src/assets/generated/bat_sheet.png' },
  gen_ghost_idle: { el: new Image(), src: '../src/assets/generated/ghost_sheet.png' },
};
let sheetsReady = false;

function getPos(idx, sw, ts = 16, mg = 1) {
  const perRow = Math.floor(sw / (ts + mg));
  return { x: (idx % perRow) * (ts + mg), y: Math.floor(idx / perRow) * (ts + mg) };
}

function preload(cb) {
  if (sheetsReady) { cb(); return; }
  let done = 0;
  const total = Object.keys(SHEETS).length;
  Object.values(SHEETS).forEach(s => {
    s.el.src = s.src;
    s.el.onload = () => { if (++done >= total) { sheetsReady = true; cb(); } };
    s.el.onerror = () => { if (++done >= total) { sheetsReady = true; cb(); } };
  });
}

// ══════════════════════════════════════════════════════════════════
// 状态
// ══════════════════════════════════════════════════════════════════
let curSource = 'all';   // 'all' | '0x72' | 'generated'
let curCat    = 'all';   // 'all' | 'CHARACTER' | ...
let showUsed  = false;

const CATS = ['CHARACTER','MONSTER','WEAPON','ITEM','SCENE','UI'];

// ══════════════════════════════════════════════════════════════════
// 计数
// ══════════════════════════════════════════════════════════════════
function buildCounts() {
  const src = { all: SPRITES.length, '0x72': 0, generated: 0 };
  const cat = { all: SPRITES.length };
  CATS.forEach(c => cat[c] = 0);
  // source×category 交叉计数
  const cross = {};
  SPRITES.forEach(sp => {
    src[sp.s]++;
    cat[sp.c]++;
    const key = sp.s + ':' + sp.c;
    cross[key] = (cross[key] || 0) + 1;
  });
  return { src, cat, cross };
}

function updateCounts() {
  const { src } = buildCounts();

  // 根据当前 source 过滤后的数量
  const srcFiltered = SPRITES.filter(sp => curSource === 'all' || sp.s === curSource);
  const catFiltered = {};
  CATS.forEach(c => catFiltered[c] = 0);
  srcFiltered.forEach(sp => catFiltered[sp.c]++);

  document.getElementById('total-count').textContent = SPRITES.length;
  document.getElementById('cnt-all').textContent    = src.all;
  document.getElementById('cnt-0x72').textContent   = src['0x72'];
  document.getElementById('cnt-generated').textContent = src.generated;

  // 分类 tab 数量：ccnt-all 为 source 过滤后的总数，各分类为 filtered 总数
  const ccntAllEl = document.getElementById('ccnt-all');
  if (ccntAllEl) ccntAllEl.textContent = srcFiltered.length;
  CATS.forEach(c => {
    const el = document.getElementById('ccnt-' + c);
    if (el) el.textContent = catFiltered[c];
  });
}

function updateCatTabsHighlight() {
  document.querySelectorAll('.cat-tab').forEach(t => {
    const id = t.id.replace('cat-', '');
    t.className = 'tab cat-tab' + (curCat === id ? ' active' : '');
  });
}

// ══════════════════════════════════════════════════════════════════
// 渲染卡片
// ══════════════════════════════════════════════════════════════════
const BASE = '../src/assets/0x72/frames';

function getDir(cat) { return cat; }

function renderCard(sp) {
  const usedCls = sp.u ? 'card used' : 'card unused';
  const badgeU   = sp.u ? '已使用' : '未使用';
  const srcCls  = sp.s === 'generated' ? 'badge-src sGenerated' : 'badge-src s0x72';
  const srcLbl  = sp.s === 'generated' ? 'Generated' : '0x72';
  const usage   = sp.g ? `<div class="usage">${sp.g}</div>` : '';

  let spriteHtml = '';
  if (sp.s === 'generated') {
    const frameDir = sp.genBase ? `../src/assets/generated/${sp.genBase}_frames` : '';
    spriteHtml = `<img src="${frameDir}/frame_00.png" alt="${sp.n}" style="max-width:72px;max-height:72px;image-rendering:pixelated" onerror="this.style.display='none';this.parentElement.style.background='#333'">`;
  } else {
    spriteHtml = `<img src="${BASE}/${sp.c}/${sp.n}.png" alt="${sp.n}" onerror="this.style.display='none';this.parentElement.style.background='#333'">`;
  }

  const coordsStr = sp.s === 'generated' ? `${sp.frames||16}帧` : `@${sp.x},${sp.y}`;
  const sizeStr = sp.s === 'generated' ? `${sp.frames||16}帧动画` : `${sp.w}×${sp.h}`;
  const refStr   = sp.ref ? `<div class="ref">→ ${sp.ref}</div>` : '';
  return `<div class="${usedCls}">
    <div class="sprite-wrap">${spriteHtml}</div>
    <div class="name">${sp.n}</div>
    <div class="coords">${coordsStr}</div>
    <div class="size">${sizeStr}</div>
    <span class="badge ${sp.u?'used':'unused'}">${badgeU}</span>
    <span class="${srcCls}">${srcLbl}</span>
    ${usage}${refStr}
  </div>`;
}

function render() {
  updateCounts();
  const filtered = SPRITES.filter(sp => {
    const srcOk = curSource === 'all' || sp.s === curSource;
    const catOk = curCat === 'all' || sp.c === curCat;
    return srcOk && catOk;
  });
  const usedCount = filtered.filter(sp => sp.u).length;

  const srcLabel = curSource === 'all' ? '全部' : curSource;
  const catLabel = curCat === 'all' ? '全部分类' : curCat;
  const title = `${srcLabel} › ${catLabel} — ${filtered.length} 个精灵（${usedCount} 已使用）`;

  let html = `<h2 class="section-title">${title}</h2><div class="grid">`;
  filtered.forEach(sp => { html += renderCard(sp); });
  html += '</div>';
  document.getElementById('content').innerHTML = html;

  preload(() => {});
}

// ══════════════════════════════════════════════════════════════════
// 交互
// ══════════════════════════════════════════════════════════════════
function setSource(src, el) {
  curSource = src;
  document.querySelectorAll('.src-tab').forEach(t => {
    const isActive = t === el;
    t.className = 'tab src-tab' + (isActive ? ' active' : '');
    // 清除旧的 active 颜色 class
    t.classList.remove('active0x72', 'activeGenerated');
    if (isActive) {
      if (src === '0x72') t.classList.add('active0x72');
      if (src === 'generated') t.classList.add('activeGenerated');
    }
  });
  // 切换 source 时重置 category 为"全部"
  const catAllEl = document.getElementById('cat-all');
  if (catAllEl) { setCategory('all', catAllEl); return; }
  // 只有在没有找到 cat-all 时才走到这里（正常不会发生）
  updateCounts();
  render();
}

function setCategory(cat, el) {
  curCat = cat;
  document.querySelectorAll('.cat-tab').forEach(t => {
    t.className = 'tab cat-tab' + (t === el ? ' active' : '');
  });
  render();
}

function toggleUsed(el) {
  showUsed = !showUsed;
  document.body.classList.toggle('show-used', showUsed);
  el.textContent = showUsed ? '仅显示已使用' : '显示全部';
  el.classList.toggle('active', showUsed);
}

// 初始化
updateCounts();
render();
</script>
